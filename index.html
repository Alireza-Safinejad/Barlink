<!DOCTYPE html>
<html lang="fa">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Barlink</title>

<style>

body{
font-family:tahoma;
margin:0;
background:#f1f4f8;
}

header{
background:#0d6efd;
color:white;
padding:15px;
text-align:center;
font-size:20px;
}

.container{
padding:15px;
padding-bottom:90px;
}

.card{
background:white;
padding:15px;
margin-bottom:15px;
border-radius:12px;
box-shadow:0 3px 8px rgba(0,0,0,0.08);
}

button{
background:#198754;
color:white;
border:none;
padding:13px;
border-radius:8px;
width:100%;
font-size:16px;
margin-top:10px;
}

.secondary{
background:#6c757d;
}

input,select{
width:100%;
padding:11px;
margin-top:10px;
border-radius:8px;
border:1px solid #ddd;
font-size:15px;
}

.hidden{
display:none;
}

.menu{
position:fixed;
bottom:0;
width:100%;
background:white;
display:flex;
justify-content:space-around;
padding:12px;
box-shadow:0 -2px 8px rgba(0,0,0,0.1);
}

.menu button{
background:none;
color:#0d6efd;
width:auto;
}

.price{
color:#198754;
font-size:19px;
font-weight:bold;
}

.badge{
background:#e9ecef;
padding:6px 12px;
border-radius:20px;
display:inline-block;
margin-top:5px;
}

</style>

</head>

<body>

<header>

BARLINK

</header>


<div class="container">


<!-- STEP 1 -->

<div id="step1">

<h3>
اطلاعات راننده
</h3>

<input id="name" placeholder="نام و نام خانوادگی">

<input id="phone" placeholder="شماره موبایل">

<select id="city">

<option>انتخاب شهر</option>

<option>سیرجان</option>
<option>کرمان</option>
<option>یزد</option>
<option>تهران</option>
<option>اصفهان</option>
<option>شیراز</option>
<option>بندرعباس</option>
<option>مشهد</option>

</select>

<button onclick="goStep2()">

مرحله بعد

</button>

</div>



<!-- STEP 2 -->

<div id="step2" class="hidden">

<h3>
مشخصات کامیون
</h3>

<select id="truck">

<option>نوع کامیون</option>

<option>تریلی</option>
<option>کمپرسی</option>
<option>کفی</option>
<option>یخچالی</option>

</select>

<input id="capacity" placeholder="ظرفیت (تن)">

<select id="cargoType">

<option>نوع بار قابل حمل</option>

<option>معدنی</option>
<option>سیمان</option>
<option>مواد غذایی</option>
<option>کاشی</option>
<option>صنعتی</option>

</select>

<button onclick="enterApp()">

ورود به سامانه

</button>

<button class="secondary" onclick="back1()">

مرحله قبل

</button>

</div>



<!-- LOADS -->

<div id="loadsPage" class="hidden">

<h3>

بارهای پیشنهادی

</h3>

<input placeholder="جستجو مقصد" onkeyup="searchLoads(this.value)">

<div id="loadsList"></div>

</div>



<!-- LOAD DETAIL -->

<div id="loadDetail" class="hidden">

<h3>

جزئیات بار

</h3>

<div class="card" id="detailBox"></div>

<button onclick="showLoads()">

بازگشت

</button>

</div>



<!-- PROFILE -->

<div id="profilePage" class="hidden">

<h3>

پروفایل راننده

</h3>

<div class="card">

<p id="pName"></p>

<p id="pPhone"></p>

<p id="pCity"></p>

<p id="pTruck"></p>

<p id="pCapacity"></p>

</div>

</div>



</div>



<div class="menu hidden" id="menu">

<button onclick="showLoads()">

بارها

</button>

<button onclick="showProfile()">

پروفایل

</button>

</div>



<script>

let driver = {}

let loads = [

{
id:1,
origin:"سیرجان",
destination:"بندرعباس",
price:"32,000,000",
cargo:"معدنی",
weight:24,
distance:40
},

{
id:2,
origin:"کرمان",
destination:"یزد",
price:"26,000,000",
cargo:"سیمان",
weight:20,
distance:30
},

{
id:3,
origin:"اصفهان",
destination:"تهران",
price:"45,000,000",
cargo:"صنعتی",
weight:22,
distance:55
},

{
id:4,
origin:"شیراز",
destination:"مشهد",
price:"58,000,000",
cargo:"کاشی",
weight:25,
distance:70
}

]


function goStep2(){

document.getElementById("step1").classList.add("hidden")

document.getElementById("step2").classList.remove("hidden")

}



function back1(){

document.getElementById("step2").classList.add("hidden")

document.getElementById("step1").classList.remove("hidden")

}



function enterApp(){

driver.name = name.value

driver.phone = phone.value

driver.city = city.value

driver.truck = truck.value

driver.capacity = capacity.value


pName.innerText = "نام: " + driver.name

pPhone.innerText = "موبایل: " + driver.phone

pCity.innerText = "شهر: " + driver.city

pTruck.innerText = "کامیون: " + driver.truck

pCapacity.innerText = "ظرفیت: " + driver.capacity + " تن"


step2.classList.add("hidden")

menu.classList.remove("hidden")

showLoads()

renderLoads(loads)

}



function renderLoads(data){

let html=""

data.forEach(load=>{

html+=`

<div class="card">

<p>

${load.origin} → ${load.destination}

</p>

<p>

نوع بار: ${load.cargo}

</p>

<p class="price">

${load.price} تومان

</p>

<p class="badge">

وزن: ${load.weight} تن

</p>

<p class="badge">

فاصله تا مبدا: ${load.distance} کیلومتر

</p>

<button onclick="showDetail(${load.id})">

مشاهده جزئیات

</button>

</div>

`

})

loadsList.innerHTML=html

}



function showDetail(id){

let load = loads.find(l=>l.id==id)

detailBox.innerHTML=`

<p>

مبدا: ${load.origin}

</p>

<p>

مقصد: ${load.destination}

</p>

<p>

نوع بار: ${load.cargo}

</p>

<p>

وزن: ${load.weight} تن

</p>

<p>

کرایه: ${load.price}

</p>

<p>

فاصله: ${load.distance} کیلومتر

</p>

<button>

تماس با بارفرما

</button>

`

loadsPage.classList.add("hidden")

loadDetail.classList.remove("hidden")

}



function showLoads(){

loadDetail.classList.add("hidden")

profilePage.classList.add("hidden")

loadsPage.classList.remove("hidden")

}



function showProfile(){

loadsPage.classList.add("hidden")

profilePage.classList.remove("hidden")

}



function searchLoads(value){

let f = loads.filter(l=>l.destination.includes(value))

renderLoads(f)

}

</script>


</body>

</html>
