<!DOCTYPE html>
<html lang="fa">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Barlink</title>

<style>

body{
font-family:tahoma;
margin:0;
background:#eef2f5;
}

header{
background:#0d6efd;
color:white;
padding:15px;
text-align:center;
font-size:22px;
}

.container{
padding:15px;
padding-bottom:80px;
}

.card{
background:white;
padding:15px;
margin-bottom:15px;
border-radius:12px;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

.price{
font-size:20px;
color:#198754;
font-weight:bold;
}

button{
background:#198754;
color:white;
border:none;
padding:12px;
border-radius:8px;
width:100%;
font-size:16px;
margin-top:10px;
}

input,select{
width:100%;
padding:10px;
margin-top:10px;
border-radius:8px;
border:1px solid #ddd;
font-size:16px;
}

.menu{
position:fixed;
bottom:0;
width:100%;
background:white;
display:flex;
justify-content:space-around;
padding:10px;
box-shadow:0 -2px 6px rgba(0,0,0,0.1);
}

.menu button{
width:auto;
padding:10px;
background:none;
color:#0d6efd;
font-weight:bold;
}

.hidden{
display:none;
}

.badge{
background:#e9ecef;
padding:5px 10px;
border-radius:20px;
font-size:12px;
}

</style>

</head>

<body>

<header>

BARLINK

</header>


<div class="container">


<div id="login">

<h3>
ثبت راننده
</h3>

<input id="name" placeholder="نام">

<input id="phone" placeholder="شماره موبایل">

<select id="truck">

<option>
نوع کامیون
</option>

<option>
تریلی
</option>

<option>
کمپرسی
</option>

<option>
کفی
</option>

<option>
یخچالی
</option>

</select>

<input id="city" placeholder="شهر فعلی">

<button onclick="enterApp()">

ورود

</button>

</div>



<div id="loadsPage" class="hidden">

<h3>
بارهای نزدیک شما
</h3>

<input placeholder="جستجوی شهر مقصد" onkeyup="searchLoads(this.value)">


<div id="loadsList"></div>

</div>



<div id="profilePage" class="hidden">

<h3>
پروفایل راننده
</h3>

<div class="card">

<p id="profileName"></p>

<p id="profileTruck"></p>

<p id="profileCity"></p>

</div>

</div>


</div>



<div class="menu hidden" id="menu">

<button onclick="showLoads()">

بارها

</button>

<button onclick="showProfile()">

پروفایل

</button>

</div>



<script>

let loads = [

{
origin:"سیرجان",
destination:"بندرعباس",
price:"32,000,000",
cargo:"مواد معدنی",
distance:40
},

{
origin:"سیرجان",
destination:"یزد",
price:"26,000,000",
cargo:"مواد غذایی",
distance:20
},

{
origin:"کرمان",
destination:"تهران",
price:"45,000,000",
cargo:"بار صنعتی",
distance:60
},

{
origin:"اصفهان",
destination:"مشهد",
price:"55,000,000",
cargo:"کاشی",
distance:80
},

{
origin:"شیراز",
destination:"بندرعباس",
price:"28,000,000",
cargo:"میوه",
distance:35
}

]


function enterApp(){

let name = document.getElementById("name").value

let truck = document.getElementById("truck").value

let city = document.getElementById("city").value

document.getElementById("profileName").innerText = "نام: " + name

document.getElementById("profileTruck").innerText = "کامیون: " + truck

document.getElementById("profileCity").innerText = "شهر: " + city


document.getElementById("login").classList.add("hidden")

document.getElementById("menu").classList.remove("hidden")

showLoads()

renderLoads(loads)

}



function renderLoads(data){

let html = ""

data.forEach(load => {

html += `

<div class="card">

<p>

${load.origin} → ${load.destination}

</p>

<p>

${load.cargo}

</p>

<p class="price">

${load.price} تومان

</p>

<p class="badge">

فاصله تا مبدا: ${load.distance} کیلومتر

</p>

<button>

تماس با بارفرما

</button>

</div>

`

})

document.getElementById("loadsList").innerHTML = html

}



function showLoads(){

document.getElementById("loadsPage").classList.remove("hidden")

document.getElementById("profilePage").classList.add("hidden")

}



function showProfile(){

document.getElementById("profilePage").classList.remove("hidden")

document.getElementById("loadsPage").classList.add("hidden")

}



function searchLoads(value){

let filtered = loads.filter(load =>

load.destination.includes(value)

)

renderLoads(filtered)

}


</script>


</body>

</html>
